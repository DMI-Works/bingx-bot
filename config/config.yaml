# Trading Bot Configuration

# Exchange Configuration
exchange:
  name: "bingx"
  api_key: "${BINGX_API_KEY}"
  api_secret: "${BINGX_API_SECRET}"
  testnet: true

  # WebSocket Configuration
  websocket:
    enabled: true
    reconnect_interval: 5
    ping_interval: 20
    max_reconnect_attempts: 10

  # REST Configuration (fallback)
  rest:
    timeout: 30
    max_retries: 3
    retry_delay: 1

# Trading Configuration
trading:
  enabled: true
  direction: "both"  # long, short, both

  # Strategy-level params (used by SimpleMovingAverageStrategy)
  sma_period: 1
  threshold_percent: 0.03
  confirmation_candles: 2
  cooldown_seconds: 3

  # Position Sizing
  position_size:
    mode: "fixed_usd"  # fixed_usd, percent_balance, fixed_risk
    value: 100

  # Leverage
  default_leverage: 20
  leverage_by_symbol: {}

  # Risk Management
  risk:
    max_open_positions: 3
    max_positions_per_symbol: 1
    max_total_risk_percent: 5.0
    max_consecutive_losses: 3
    cooldown_after_trade_seconds: 60

  # Stop Loss
  stop_loss:
    mode: "fixed_percent"  # fixed_percent, atr, structural, local_extremum
    value: 2.0             # используется при mode: fixed_percent
    atr:                   # используется при mode: atr
      period: 14
      multiplier: 1.5

  # Take Profit
  take_profit:
    enabled: true
    levels:                # используется при stop_loss.mode: fixed_percent
      - percent: 3.0
        close_percent: 50
      # - percent: 5.0
      #   close_percent: 50
    atr:                   # используется при stop_loss.mode: atr
      multipliers: [2.0, 3.5]
      close_percents: [50, 50]
    trailing:
      enabled: false
      activation_percent: 2.0
      callback_percent: 1.0

  # Filters
  filters:
    whitelist_symbols: ["CLO-USDT", "VINE-USDT", "DEXE-USDT", "BEAT-USDT", "XPIN-USDT"]
    blacklist_symbols: []
    max_symbols: 7
    min_price: {}
    max_price: {}
    min_volume_24h: 1000000
    max_spread_percent: 0.5
    min_atr: 0

  # Time Filters
  time_filters:
    enabled: false
    allowed_hours: []
    timezone: "UTC"

# Strategy Configuration
strategies:
  enabled: ['SimpleMovingAverageStrategy']

# Database Configuration
database:
  path: "data/trading_bot.db"
  backup_interval_hours: 6

# Logging Configuration
logging:
  level: "INFO"
  file: "logs/trading_bot.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

# Telegram Configuration
telegram:
  enabled: true
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"

  # Notifications
  notifications:
    position_opened: true
    position_closed: true
    take_profit_hit: true